<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | NIPOON Clothing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f8f8f8',
                            100: '#e8e8e8',
                            200: '#d1d1d1',
                            300: '#b0b0b0',
                            400: '#888888',
                            500: '#6d6d6d',
                            600: '#5d5d5d',
                            700: '#4f4f4f',
                            800: '#454545',
                            900: '#3d3d3d',
                            950: '#000000',
                        },
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-gray-50 text-brand-950 selection:bg-brand-950 selection:text-white">

    <!-- Simple Nav -->
    <nav class="bg-white border-b border-gray-100 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <img src="images/logo.jpg" alt="Logo" class="h-8 w-auto">
                <span class="text-xl font-black uppercase tracking-tighter">NIPOON.</span>
            </a>
            <a href="shop.html" class="text-sm font-bold uppercase tracking-wider hover:text-gray-600 transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Shop
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-black uppercase tracking-tighter mb-10">Checkout</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Left: Form -->
            <div class="bg-white border border-gray-100 p-8 rounded-sm shadow-sm">
                <h2 class="text-xl font-bold uppercase tracking-wider mb-8 border-b border-gray-100 pb-4">Delivery Details</h2>
                
                <form id="checkout-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Full Name</label>
                            <input type="text" id="checkout-name" placeholder="Enter your full name" required 
                                class="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-brand-950 transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Phone Number</label>
                            <input type="tel" id="checkout-phone" placeholder="e.g. 07XXXXXXXX" required 
                                class="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-brand-950 transition-colors">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Delivery Address</label>
                        <textarea id="checkout-address" rows="3" placeholder="Enter complete address for delivery" required 
                            class="w-full bg-gray-50 border border-gray-200 px-4 py-3 focus:outline-none focus:border-brand-950 transition-colors"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Payment Method</label>
                        <div class="space-y-3">
                            <label class="flex items-center gap-3 p-4 border border-gray-200 cursor-pointer hover:bg-gray-50 transition-colors rounded-sm">
                                <input type="radio" name="payment" value="Cash on Delivery (COD)" checked class="text-brand-950 focus:ring-0">
                                <div>
                                    <p class="text-sm font-bold uppercase">Cash on Delivery (COD)</p>
                                    <p class="text-[10px] text-gray-500 italic">Pay when you receive your package</p>
                                </div>
                            </label>
                            <label class="flex items-center gap-3 p-4 border border-gray-200 cursor-pointer hover:bg-gray-50 transition-colors rounded-sm">
                                <input type="radio" name="payment" value="Bank Transfer" class="text-brand-950 focus:ring-0">
                                <div>
                                    <p class="text-sm font-bold uppercase">Bank Transfer</p>
                                    <p class="text-[10px] text-gray-500 italic">Transfer to our bank account</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-brand-950 text-white font-black uppercase tracking-widest py-5 hover:bg-brand-800 transition-all shadow-xl flex items-center justify-center gap-3">
                        <i class="fa-brands fa-whatsapp text-xl"></i> Complete Order via WhatsApp
                    </button>
                    <p class="text-center text-[10px] text-gray-400">By clicking the button, you will be directed to WhatsApp to finalize your order with our team.</p>
                </form>
            </div>

            <!-- Right: Summary -->
            <div>
                <div class="bg-brand-950 text-white p-8 rounded-sm shadow-xl sticky top-28">
                    <h2 class="text-xl font-bold uppercase tracking-wider mb-8 border-white/10 border-b pb-4">Order Summary</h2>
                    
                    <div id="checkout-summary-items" class="space-y-4 mb-8 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Items injected by JS -->
                        <p class="text-gray-400 italic">Your cart is being loaded...</p>
                    </div>

                    <div class="border-t border-white/10 pt-6 space-y-3">
                        <div class="flex justify-between text-gray-400">
                            <span>Subtotal</span>
                            <span id="checkout-summary-total">Rs. 0.00</span>
                        </div>
                        <div class="flex justify-between text-gray-400">
                            <span>Delivery</span>
                            <span class="italic text-[10px]">To be calculated</span>
                        </div>
                        <div class="flex justify-between text-xl font-black uppercase pt-3 border-t border-white/10">
                            <span>Total</span>
                            <span id="checkout-final-total"></span> <!-- Calculated in main.js or here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-10 mt-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-xs text-gray-500 uppercase tracking-widest font-bold">&copy; 2026 NIPOON Clothing. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // Additional page-specific logic if needed
        document.addEventListener('DOMContentLoaded', () => {
             const finalTotal = document.getElementById('checkout-final-total');
             const subTotal = document.getElementById('checkout-summary-total');
             // Link them for now as delivery is missing
             const observer = new MutationObserver(() => {
                 finalTotal.textContent = subTotal.textContent;
             });
             observer.observe(subTotal, { characterData: true, childList: true, subtree: true });
        });
    </script>
</body>
</html>
